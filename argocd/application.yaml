apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canasta-k8s-test
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:cicalese/test-gitops.git
    targetRevision: HEAD
    path: .
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: canasta-k8s-test
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
