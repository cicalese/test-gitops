argocd:
  namespace: argocd
  repoURL: ''
  syncPolicy:
    automated: true
    prune: true
    selfHeal: true
  targetRevision: HEAD
caddy:
  image: caddy:2.10.2-alpine
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi
configData:
  caddy:
    Caddyfile: "# Auto-generated by Canasta-Ansible — DO NOT EDIT\n# To add custom
      Caddy directives, edit Caddyfile.site instead.\n# For global Caddy options or
      additional site blocks, edit Caddyfile.global instead.\n\nimport /etc/caddy/Caddyfile.global\n\nhttp://dev.acknowledge.wiki
      {\n    import /etc/caddy/Caddyfile.site\n\n    reverse_proxy varnish:80\n\n
      \   log {\n        output file /var/log/caddy/access.log\n    }\n}\n"
    Caddyfile.global: '# Global Caddy configuration for this Canasta instance.

      # This file is imported at the top level of the auto-generated Caddyfile

      # and is not overwritten by the CLI or by upgrades.

      #

      # You can add a global options block, extra site blocks, or both.

      #

      # Example — redirect www to non-www:

      #

      #   www.example.com {

      #       redir https://example.com{uri} permanent

      #   }

      #

      # See https://caddyserver.com/docs/caddyfile/options for global options

      # and https://caddyserver.com/docs/caddyfile for the full Caddyfile reference.

      '
    Caddyfile.site: '# Site-level Caddy configuration for this Canasta instance.

      # This file is imported inside the site block of the auto-generated

      # Caddyfile and is not overwritten by the CLI or by upgrades.

      #

      # Add your custom Caddy directives below. For example:

      #   header X-Frame-Options "SAMEORIGIN"

      #   header X-Content-Type-Options "nosniff"

      #

      # See https://caddyserver.com/docs/caddyfile/directives for available directives.

      '
  db: {}
  env:
    CANASTA_ENABLE_WIKI_DIRECTORY: 'false'
    MW_SITEMAP_PAUSE_DAYS: '1'
    PHP_MAX_INPUT_VARS: '1000'
    PHP_POST_MAX_SIZE: 10M
    PHP_UPLOAD_MAX_FILESIZE: 10M
  varnish: {}
  web:
    .env: 'HTTP_PORT=80

      HTTPS_PORT=443

      MYSQL_PASSWORD=Kd%FQLImhQxs7sZhcNWf!^qHGJgpqu

      MW_SITE_SERVER=https://dev.acknowledge.wiki

      MW_SITE_FQDN=dev.acknowledge.wiki

      PHP_UPLOAD_MAX_FILESIZE=10M

      PHP_POST_MAX_SIZE=10M

      PHP_MAX_INPUT_VARS=1000

      CANASTA_ENABLE_ELASTICSEARCH=false

      CANASTA_ENABLE_VARNISH=true

      CANASTA_ENABLE_WIKI_DIRECTORY=false

      MW_SITEMAP_PAUSE_DAYS=1

      USE_EXTERNAL_DB=false


      CANASTA_IMAGE=ghcr.io/canastawiki/canasta:3.5.4

      MW_SECRET_KEY=ac763b662d1434ce206e955863b2243059a4f82ba9d87147ed90b0c36730af73

      CADDY_AUTO_HTTPS=off'
    settings--global--CanastaFooterIcon.php: "<?php\n// We appreciate your support
      for Canasta!\n// If you would like to remove the Canasta logo from your wiki,
      simply delete this file.\n$wgFooterIcons['poweredby']['canasta'] = [\n    'src'
      => \"$wgResourceBasePath/resources/assets/Powered-by-Canasta.png\",\n    'url'
      => 'https://www.canasta.wiki/',\n    'alt' => 'Powered by Canasta'\n];\n"
    settings--global--DefaultSettings.php: '<?php

      // Default settings for all wikis in the instance.

      // This file makes all wikis private by default: only logged-in users can

      // read pages, and anonymous users are blocked from editing or creating accounts.

      //

      // You can edit or delete this file to change the defaults for all wikis.

      // Per-wiki overrides can be placed in config/settings/wikis/<wiki-id>/.

      $wgGroupPermissions[''*''][''read''] = false;

      $wgGroupPermissions[''*''][''edit''] = false;

      $wgGroupPermissions[''*''][''createaccount''] = false;

      '
    settings--global--Vector.php: '<?php

      // Load the Vector skin and set it as the default.

      // This is a default Canasta file. To not have Vector installed,

      // simply delete this file.

      $wgDefaultSkin = "vector-2022";

      wfLoadSkin( ''Vector'' );

      '
    wikis.yaml: "wikis:\n- id: main\n  url: dev.acknowledge.wiki\n  name: main\n"
db:
  image: mariadb:11.4
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
  storage: 10Gi
  storageClass: ''
domains:
- dev.acknowledge.wiki
elasticsearch:
  enabled: false
  image: elasticsearch:7.17.9
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
  storage: 5Gi
  storageClass: ''
image:
  pullPolicy: IfNotPresent
  repository: ghcr.io/canastawiki/canasta
  tag: 3.5.4
ingress:
  annotations: {}
  certManager:
    enabled: true
    issuer: letsencrypt-prod
  className: ''
  enabled: true
  tls: true
instance:
  id: k8s-test
jobrunner:
  enabled: true
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi
persistence:
  extensions:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ''
  images:
    accessMode: ReadWriteOnce
    size: 10Gi
    storageClass: ''
  publicAssets:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ''
  skins:
    accessMode: ReadWriteOnce
    size: 1Gi
    storageClass: ''
secrets:
  dbSecretName: k8s-test-db-credentials
  mwSecretName: k8s-test-mw-secrets
varnish:
  enabled: true
  image: varnish:7.0.2-alpine
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi
web:
  replicaCount: 1
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 512Mi
